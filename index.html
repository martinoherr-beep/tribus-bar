<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tribus Bar</title>

    <!-- ✨ ICONO PARA PESTAÑAS PEQUEÑAS (FAVICON) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    
    <!-- ✨ RECONEXIÓN DE LA PWA PARA PC Y ANDROID (Con truco anti-caché) -->
    <link rel="manifest" href="/manifest.json?v=2" />
    <meta name="theme-color" content="#ea580c" />

    <!-- ✨ SOPORTE DE ICONO PARA IPHONE / IPAD / MAC -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tribu's Bar">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <!-- Lector QR Externo -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
